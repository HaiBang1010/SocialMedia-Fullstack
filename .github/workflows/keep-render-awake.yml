# Keep the Render free-tier backend awake.
#
# Render free instances sleep after ~15 min of no traffic (cold start ~30-60s on wake). This cron
# pings the lightweight /health endpoint (no DB query) every 10 min to keep it warm.
#
# SETUP (one-time, manual): add a repository VARIABLE named BACKEND_HEALTH_URL
#   GitHub repo > Settings > Secrets and variables > Actions > Variables tab > New repository variable
#   value e.g. https://<your-app>.onrender.com/health
#
# Notes: GitHub scheduled workflows can be delayed/skipped on low-activity repos; Actions minutes are
# free on PUBLIC repos but billed on private ones. For stricter uptime, an external pinger
# (UptimeRobot / cron-job.org) is an alternative.

name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions: {} # the ping needs no GITHUB_TOKEN scopes

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        env:
          URL: ${{ vars.BACKEND_HEALTH_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "::error::Repository variable BACKEND_HEALTH_URL is not set (Settings > Secrets and variables > Actions > Variables)."
            exit 1
          fi
          # --max-time 90 tolerates a cold start. Capture only the HTTP status; fall back to 000 on a
          # connection failure (timeout / DNS) so the status check below produces a clear error.
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL") || code="000"
          echo "Pinged $URL -> HTTP $code"
          if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
            echo "::error::Unexpected HTTP status $code (expected 200-399)"
            exit 1
          fi
